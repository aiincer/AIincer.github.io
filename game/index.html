<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Designer AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎮 AI Game Designer</h1>
