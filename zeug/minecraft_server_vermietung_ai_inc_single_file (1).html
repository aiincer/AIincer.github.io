<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ai-inc — Minecraft Server mieten</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {margin:0; font-family:'Inter', sans-serif; background:linear-gradient(135deg,#6e8efb,#a777e3); color:#333;}
    header {background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); color:#fff; padding:30px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.2);}
    header h1 {margin:0; font-size:36px; font-weight:800; letter-spacing:1px;}
    header p {margin:4px 0 0; font-size:16px; color:#e0e0e0;}
    main {max-width:800px; margin:40px auto; padding:30px; background:rgba(255,255,255,0.9); border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.2);}
    h2 {margin-top:0; font-size:28px; color:#4a3aff;}
    label {display:block; margin-top:12px; font-weight:600; color:#333;}
    input, select, textarea {width:100%; padding:12px; margin-top:6px; border-radius:10px; border:1px solid #ccc; font-size:14px;}
    button {margin-top:20px; padding:14px 24px; background:linear-gradient(90deg,#4a3aff,#6e8efb); color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:700; font-size:16px; transition:0.3s;}
    button:hover {opacity:0.9; transform:scale(1.03);}
    .plans {display:flex; gap:12px; margin-top:16px;}
    .plan {flex:1; padding:16px; border:1px solid #ccc; border-radius:12px; cursor:pointer; text-align:center; font-weight:600; transition:0.3s; background:#f5f5f5;}
    .plan.active {border-color:#4a3aff; background:#e7e5ff; box-shadow:0 6px 20px rgba(74,58,255,0.2);}
    .summary {margin-top:25px; padding:20px; background:#f0f0ff; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1);}
    .summary div {margin-bottom:8px; font-size:14px;}
    @media(max-width:600px){.plans{flex-direction:column;}}
  </style>
</head>
<body>
  <header>
    <h1>ai-inc</h1>
    <p>Kostenlose Minecraft Server mieten</p>
  </header>
  <main>
    <h2>Server konfigurieren</h2>

    <div class="plans" id="plans">
      <div class="plan" data-plan="standard" id="plan-standard">Standard<br>4 GB RAM / 10 GB Speicher</div>
      <div class="plan active" data-plan="plus" id="plan-plus">Plus<br>8 GB RAM / 30 GB Speicher</div>
    </div>

    <form id="orderForm">
      <label for="name">Dein Name</label>
      <input id="name" type="text" placeholder="Max Mustermann" required />

      <label for="email">Deine E-Mail</label>
      <input id="email" type="email" placeholder="du@beispiel.de" required />

      <label for="type">Server-Typ</label>
      <select id="type">
        <option value="paper">Paper (Java)</option>
        <option value="fabric">Fabric (Java)</option>
        <option value="spigot">Spigot (Java)</option>
        <option value="bungeecord">BungeeCord</option>
        <option value="velocity">Velocity</option>
        <option value="bedrock">Bedrock</option>
      </select>

      <label for="version">Minecraft-Version</label>
      <input id="version" type="text" placeholder="1.20.4" />

      <label for="note">Weitere Wünsche / Plugins</label>
      <textarea id="note" rows="3" placeholder="z.B. WorldEdit, Dynmap"></textarea>

      <button type="submit">Server anfragen</button>
    </form>

    <div class="summary">
      <div>Admins (E-Mails): antoschasad@gmail.com, cattech3d@gmail.com</div>
      <div>Tarif: <span id="s-plan">Plus</span></div>
      <div>RAM: <span id="s-ram">8 GB</span></div>
      <div>Speicher: <span id="s-storage">30 GB</span></div>
      <div>Typ: <span id="s-type">Paper</span></div>
      <div>Version: <span id="s-version">1.20.4</span></div>
    </div>
  </main>

  <script>
    const plans = document.querySelectorAll('.plan');
    const selectedPlanEl = document.getElementById('s-plan');
    const sRam = document.getElementById('s-ram');
    const sStorage = document.getElementById('s-storage');
    const sType = document.getElementById('s-type');
    const sVersion = document.getElementById('s-version');

    let currentPlan = 'plus';
    function setPlan(name){
      currentPlan = name;
      plans.forEach(p=>p.classList.toggle('active', p.dataset.plan===name));
      if(name==='plus'){
        selectedPlanEl.textContent='Plus'; sRam.textContent='8 GB'; sStorage.textContent='30 GB';
      } else {
        selectedPlanEl.textContent='Standard'; sRam.textContent='4 GB'; sStorage.textContent='10 GB';
      }
    }
    plans.forEach(p=>p.addEventListener('click', ()=>setPlan(p.dataset.plan)));

    const typeSelect = document.getElementById('type');
    typeSelect.addEventListener('change', ()=>{ sType.textContent = typeSelect.options[typeSelect.selectedIndex].text; });
    const versionInput = document.getElementById('version');
    versionInput.addEventListener('input', ()=>{ sVersion.textContent = versionInput.value || '—'; });

    document.getElementById('orderForm').addEventListener('submit', (e)=>{
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const type = document.getElementById('type').value;
      const version = document.getElementById('version').value.trim() || '(nicht angegeben)';
      const note = document.getElementById('note').value.trim() || '(keine)';
      const plan = currentPlan;
      const ram = plan==='plus' ? '8 GB' : '4 GB';
      const storage = plan==='plus' ? '30 GB' : '10 GB';

      const body = encodeURIComponent(
        `Name: ${name}\nE-Mail: ${email}\nTarif: ${plan} (${ram} / ${storage})\nTyp: ${type}\nVersion: ${version}\nNotiz: ${note}`
      );
      const to = 'antoschasad@gmail.com,cattech3d@gmail.com';
      window.location.href = `mailto:${to}?subject=Neue Server-Anfrage von ${encodeURIComponent(name)}&body=${body}`;
    });

    setPlan('plus');
  </script>
</body>
</html>
