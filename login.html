<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI-Inc</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    header {
      display: flex;
      align-items: center;
      padding: 15px 40px;
      background-color: #4CAF50;
      color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .logo {
      font-size: 2.2rem;
      font-weight: bold;
    }
    main {
      margin: 60px auto;
      max-width: 400px;
      text-align: center;
      padding: 0 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 25px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    /* Nutzername-Feld */
    #username {
      width: 100%;
      padding: 12px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    /* Passwort + Button inline */
    .password-wrapper {
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      flex: 1;
      padding: 12px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .password-wrapper button {
      padding: 12px 15px;
      margin-left: 10px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #f5f5f5;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .password-wrapper button:hover {
      background-color: #e0e0e0;
    }
    .btn {
      background-color: #4CAF50;
      color: white;
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      transition: background-color 0.3s, transform 0.2s;
    }
    .btn:hover {
      background-color: #45a049;
      transform: scale(1.03);
    }
    .create-account {
      display: block;
      margin-top: 15px;
      font-size: 0.95rem;
      text-decoration: none;
      color: #4CAF50;
    }
    .create-account:hover {
      text-decoration: underline;
    }
    #message {
      margin-top: 10px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">AI-Inc</div>
  </header>
  <main>
    <h1>Login</h1>
    <form id="Form">
      <input type="text" id="username" placeholder="Nutzername" required>

      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Passwort" required>
        <button type="button" id="togglePassword">Anzeigen</button>
      </div>

      <button class="btn" type="submit">Einloggen</button>
    </form>
    <p id="message"></p>
    <a class="create-account" href="/singup">Account erstellen</a>
  </main>
  <script src="../scripts/login.js"></script>
  <script>
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');

    togglePassword.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePassword.textContent = 'Verbergen';
      } else {
        passwordInput.type = 'password';
        togglePassword.textContent = 'Anzeigen';
      }
    });
  </script>
</body>
</html>
