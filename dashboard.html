<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Status Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-6">
    <h1 class="text-4xl font-bold mb-6 text-center">Minecraft Server Status Checker</h1>

    <div class="w-full max-w-md">
        <input id="serverIP" type="text" placeholder="Server IP eingeben (z.B. took-wear.gl.joinmc.link)" 
               class="w-full p-3 rounded-lg text-gray-900 mb-4 focus:outline-none focus:ring-2 focus:ring-green-400">
        <button onclick="checkServer()" 
                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition duration-300">
            Status prüfen
        </button>
    </div>

    <div id="statusDisplay" class="mt-8 w-full max-w-md bg-gray-800 p-6 rounded-xl shadow-lg text-center">
        Gib eine IP ein und klicke auf "Status prüfen".
    </div>

    <script>
        async function checkServer() {
            const ip = document.getElementById('serverIP').value;
            const statusDiv = document.getElementById('statusDisplay');

            if(!ip) {
                statusDiv.innerHTML = 'Bitte gib eine Server-IP ein.';
                return;
            }

            statusDiv.innerHTML = '<p class="text-yellow-400">Prüfe Server...</p>';

            try {
                // API-Abfrage
                const response = await fetch(`https://api.mcsrvstat.us/2/${ip}`);
                const data = await response.json();

                if(data.online) {
                    statusDiv.innerHTML = `
                        <h2 class="text-2xl font-bold text-green-400 mb-2">${ip} ist online ✅</h2>
                        <p>Spieler online: <span class="font-semibold">${data.players.online} / ${data.players.max}</span></p>
                        <p>Version: <span class="font-semibold">${data.version}</span></p>
                        <p class="mt-2">Motd:</p>
                        <p class="bg-gray-700 p-3 rounded mt-1">${data.motd.clean.join('<br>')}</p>
                    `;
                } else {
                    statusDiv.innerHTML = `<h2 class="text-2xl font-bold text-red-500">${ip} ist offline ❌</h2>`;
                }
            } catch (error) {
                statusDiv.innerHTML = '<p class="text-red-500">Fehler beim Abrufen des Serverstatus. Playit-IPs werden eventuell nicht unterstützt.</p>';
                console.error(error);
            }
        }
    </script>
</body>
</html>
