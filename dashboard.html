<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Server Status Checker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-6">

<h1 class="text-4xl font-bold mb-6 text-center">Minecraft Server Status Checker</h1>

<div class="w-full max-w-md">
    <input id="serverIP" type="text" placeholder="Server IP eingeben" 
           class="w-full p-3 rounded-lg text-gray-900 mb-4 focus:outline-none focus:ring-2 focus:ring-green-400">
    <button onclick="checkServer()" 
            class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition duration-300">
        Status prüfen
    </button>
</div>

<div id="statusDisplay" class="mt-8 w-full max-w-md bg-gray-800 p-6 rounded-xl shadow-lg text-center">
    Gib eine IP ein und klicke auf "Status prüfen".
</div>

<script>
async function checkServer() {
    const ip = document.getElementById('serverIP').value.trim();
    const statusDiv = document.getElementById('statusDisplay');

    if (!ip) {
        statusDiv.innerHTML = 'Bitte gib eine Server-IP ein.';
        return;
    }

    statusDiv.innerHTML = '<p class="text-yellow-400">Prüfe Server über 3 APIs...</p>';

    // Drei APIs gleichzeitig abfragen
    const apis = [
        `https://api.mcsrvstat.us/2/${ip}`,
        `https://api.minetools.eu/ping/${ip}/25565`,
        `https://api.mcstatus.io/v2/status/java/${ip}`
    ];

    try {
        const results = await Promise.allSettled(apis.map(url => fetch(url).then(r => r.json())));
        let online = false;
        let bestResult = null;

        for (let res of results) {
            if (res.status === "fulfilled") {
                const data = res.value;

                // Prüfen, ob Server online
                if ((data.online || (data.status && data.status.online)) && !online) {
                    online = true;
                    bestResult = data;
                }
            }
        }

        if (online) {
            let players = bestResult.players?.online ?? bestResult.status?.players?.online ?? "?";
            let maxPlayers = bestResult.players?.max ?? bestResult.status?.players?.max ?? "?";
            let version = bestResult.version ?? bestResult.status?.version?.name ?? "?";
            let motd = bestResult.motd?.clean?.join('<br>') ?? bestResult.status?.motd?.clean?.join('<br>') ?? "";

            statusDiv.innerHTML = `
                <h2 class="text-2xl font-bold text-green-400 mb-2">${ip} ist online ✅</h2>
                <p>Spieler online: <span class="font-semibold">${players} / ${maxPlayers}</span></p>
                <p>Version: <span class="font-semibold">${version}</span></p>
                <p class="mt-2">Motd:</p>
                <p class="bg-gray-700 p-3 rounded mt-1">${motd}</p>
            `;
        } else {
            statusDiv.innerHTML = `<h2 class="text-2xl font-bold text-red-500">${ip} ist offline ❌</h2>`;
        }
    } catch (err) {
        console.error(err);
        statusDiv.innerHTML = '<p class="text-red-500">Fehler beim Abrufen des Serverstatus.</p>';
    }
}
</script>

</body>
</html>
