<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Status Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        .status {
            margin-top: 20px;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }
        .online {
            color: lightgreen;
        }
        .offline {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Minecraft Server Status Checker</h1>
    <input type="text" id="serverIP" placeholder="Server IP eingeben">
    <button onclick="checkServer()">Status prüfen</button>

    <div class="status" id="statusDisplay">Gib eine IP ein und klicke auf "Status prüfen".</div>

    <script>
        async function checkServer() {
            const ip = document.getElementById('serverIP').value;
            const statusDiv = document.getElementById('statusDisplay');

            if(!ip) {
                statusDiv.innerHTML = 'Bitte gib eine Server-IP ein.';
                return;
            }

            statusDiv.innerHTML = 'Prüfe Server...';

            try {
                const response = await fetch(`https://api.mcsrvstat.us/2/${ip}`);
                const data = await response.json();

                if(data.online) {
                    statusDiv.innerHTML = `
                        <p class="online">Server ist online ✅</p>
                        <p>Spieler online: ${data.players.online} / ${data.players.max}</p>
                        <p>Version: ${data.version}</p>
                        <p>Motd: ${data.motd.clean.join('<br>')}</p>
                    `;
                } else {
                    statusDiv.innerHTML = `<p class="offline">Server ist offline ❌</p>`;
                }
            } catch (error) {
                statusDiv.innerHTML = 'Fehler beim Abrufen des Serverstatus.';
                console.error(error);
            }
        }
    </script>
</body>
</html>
