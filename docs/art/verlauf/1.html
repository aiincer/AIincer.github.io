<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIincer Canvas Tool</title>
<style>
/* --- Grundlayout --- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f0f1b, #1a1a2e);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 95%;
  max-width: 1000px;
  padding: 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

header {
  text-align: center;
  margin-bottom: 20px;
}

header h1 {
  font-size: 2rem;
  background: linear-gradient(90deg, #00f5ff, #ff00c8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

nav button {
  padding: 10px 25px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(90deg, #00f5ff, #ff00c8);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

nav button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00f5ff;
}

.section {
  display: none;
  animation: fadeIn 0.5s ease forwards;
}

.section.active {
  display: block;
}

footer {
  text-align: center;
  margin-top: 20px;
  opacity: 0.6;
  font-size: 0.9rem;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* --- Canvas Tool Styles --- */
canvas {
  border: 1px solid #ffffff50;
  display: block;
  margin: 0 auto 15px;
  cursor: crosshair;
  border-radius: 15px;
}

#controls {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}

#controls input, #controls button {
  padding: 8px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

#controls input {
  width: 60px;
}

#controls button {
  background: linear-gradient(90deg, #00f5ff, #ff00c8);
  color: white;
  transition: 0.3s;
}

#controls button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00f5ff;
}
</style>
</head>
<body>

<div class="container">

<header>
  <h1>AIincer</h1>
</header>

<nav>
  <button onclick="showSection('tool')">Canvas Tool</button>
</nav>

<!-- Canvas Tool Section -->
<div id="tool" class="section active">
  <canvas id="myCanvas" width="800" height="800"></canvas>
  <div id="controls">
    <input type="color" id="colorPicker" value="#ff0000">
    <button id="exportBtn">Export als PNG</button>
  </div>
</div>

<footer id="lizenz"></footer>

</div>
<script src="/assets/js/lizenz.js"></script>
<script>
// --- Section Switch ---
function showSection(id) {
  document.querySelectorAll('.section').forEach(section => {
    section.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

// --- Canvas Tool ---
const canvas = document.getElementById('myCanvas');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('colorPicker');
const exportBtn = document.getElementById('exportBtn');

let points = [];
let selectedPoint = null;
const radius = 10;

// Hex zu RGB
function hexToRgb(hex) {
    hex = hex.replace('#','');
    return {
        r: parseInt(hex.substring(0,2),16),
        g: parseInt(hex.substring(2,4),16),
        b: parseInt(hex.substring(4,6),16)
    };
}

// Render 2D-Farbverlauf
function renderGradient(showPoints = true) {
    const imageData = ctx.createImageData(canvas.width, canvas.height);
    const data = imageData.data;

    for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
            let r=0,g=0,b=0,totalWeight=0;
            points.forEach(p=>{
                const dx = x-p.x;
                const dy = y-p.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                const weight = 1/(distance+1);
                r += p.color.r * weight;
                g += p.color.g * weight;
                b += p.color.b * weight;
                totalWeight += weight;
            });
            if(totalWeight>0){
                r = Math.min(255,Math.round(r/totalWeight));
                g = Math.min(255,Math.round(g/totalWeight));
                b = Math.min(255,Math.round(b/totalWeight));
            }
            const index = (y*canvas.width+x)*4;
            data[index]=r;
            data[index+1]=g;
            data[index+2]=b;
            data[index+3]=255;
        }
    }
    ctx.putImageData(imageData,0,0);

    if(showPoints){
        points.forEach(p=>{
            ctx.beginPath();
            ctx.arc(p.x,p.y,radius,0,2*Math.PI);
            ctx.fillStyle=`rgb(${p.color.r},${p.color.g},${p.color.b})`;
            ctx.fill();
            ctx.lineWidth=2;
            ctx.strokeStyle='#ffffff';
            ctx.stroke();
        });
    }
}

// Klick auf Punkt erkennen
function getPointAt(x,y){
    return points.find(p=>{
        const dx=x-p.x;
        const dy=y-p.y;
        return Math.sqrt(dx*dx+dy*dy)<=radius;
    });
}

// Maus Events
let dragging=false;
canvas.addEventListener('mousedown',e=>{
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;
    const p=getPointAt(x,y);
    if(p){
        selectedPoint=p;
        dragging=true;
        p.color = hexToRgb(colorPicker.value);
        renderGradient();
    } else {
        points.push({x,y,color:hexToRgb(colorPicker.value)});
        renderGradient();
    }
});

canvas.addEventListener('mousemove',e=>{
    if(dragging && selectedPoint){
        const rect=canvas.getBoundingClientRect();
        selectedPoint.x=e.clientX-rect.left;
        selectedPoint.y=e.clientY-rect.top;
        renderGradient();
    }
});

canvas.addEventListener('mouseup',e=>{
    dragging=false;
    selectedPoint=null;
});

canvas.addEventListener('mouseleave',e=>{
    dragging=false;
    selectedPoint=null;
});

// Export Button
exportBtn.addEventListener('click',()=>{
    renderGradient(false); // ohne Punkte
    const link=document.createElement('a');
    link.download='canvas_gradient.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    renderGradient(true); // wieder Punkte anzeigen
});

renderGradient();
</script>

</body>
</html>
