<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AIincer</title><style> * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; } body { background: linear-gradient(135deg, #0f0f1b, #1a1a2e); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; } .container { width: 95%; max-width: 1000px; padding: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 0 40px rgba(0,255,255,0.2); } header { text-align: center; margin-bottom: 20px; } header h1 { font-size: 2rem; background: linear-gradient(90deg, #00f5ff, #ff00c8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; } nav button { padding: 10px 25px; border: none; border-radius: 30px; background: linear-gradient(90deg, #00f5ff, #ff00c8); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; } nav button:hover { transform: scale(1.05); box-shadow: 0 0 15px #00f5ff; } .section { display: none; animation: fadeIn 0.5s ease forwards; } .section.active { display: block; } footer { text-align: center; margin-top: 20px; opacity: 0.6; font-size: 0.9rem; } @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} } canvas { border: 1px solid #ffffff50; display: block; margin: 0 auto 15px; cursor: crosshair; border-radius: 15px; } #controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; } #controls input, #controls button { padding: 8px 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; } #controls input { width: 60px; } #controls button { background: linear-gradient(90deg, #00f5ff, #ff00c8); color: white; transition: 0.3s; } #controls button:hover { transform: scale(1.05); box-shadow: 0 0 15px #00f5ff; } #point-menu { position: absolute; min-width: 140px; padding: 8px; border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); backdrop-filter: blur(6px); } #point-menu button { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 6px 8px; border-radius: 8px; cursor: pointer; } .json-menu { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(8px); display: flex; flex-direction: column; gap:8px; padding:8px; background: rgba(0,0,0,0.45); border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: transform 180ms ease, opacity 180ms ease; } .json-menu.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; } </style></head><body><div class="container"><header><h1>AIincer Canvas Tool</h1></header><nav><button onclick="showSection('tool')">Canvas Tool</button></nav><div id="tool" class="section active"><canvas id="myCanvas" width="800" height="800"></canvas><div id="controls"><input type="color" id="colorPicker" value="#ff0000"><div class="png-wrapper" style="position:relative; display:inline-flex; align-items:center; margin-right:8px;"><button id="pngBtn">PNG</button><div id="pngMenu" class="json-menu"><button id="exportPngMenuBtn">Export</button></div></div><div class="json-wrapper" style="position:relative; display:inline-flex; align-items:center;"><button id="jsonBtn">JSON</button><div id="jsonMenu" class="json-menu"><button id="exportJsonBtn">Export</button><button id="importJsonBtn">Import</button><input id="importFile" type="file" accept="application/json" style="display:none"></div></div></div></div><footer id="lizenz"></footer></div><script src="/assets/js/lizenz.js"></script><script defer> const canvas = document.getElementById('myCanvas'); const ctx = canvas.getContext('2d'); const colorPicker = document.getElementById('colorPicker'); const radius = 10; const points = []; let activePoint = null; let offset = {x:0,y:0}; let moved = false; let startedOnPoint = false; let menuTimeout = null; function hexToRgb(hex){ hex = (hex||'#ffffff').replace('#',''); return { r: parseInt(hex.substring(0,2),16), g: parseInt(hex.substring(2,4),16), b: parseInt(hex.substring(4,6),16) }; } function getPointAt(x,y){ return points.find(p=>{ const dx = x - p.x; const dy = y - p.y; return Math.sqrt(dx*dx + dy*dy) <= radius; }); } function renderGradient(showPoints = true){ const w = canvas.width, h = canvas.height; const imageData = ctx.createImageData(w,h); const data = imageData.data; for(let y=0;y<h;y++){ for(let x=0;x<w;x++){ let r=0,g=0,b=0,tw=0; for(const p of points){ const dx = x-p.x, dy = y-p.y; const d = Math.sqrt(dx*dx+dy*dy); const weight = 1/(d+1); r += p.color.r*weight; g += p.color.g*weight; b += p.color.b*weight; tw += weight; } if(tw>0){ r = Math.round(r/tw); g = Math.round(g/tw); b = Math.round(b/tw); } const i = (y*w + x)*4; data[i]=r; data[i+1]=g; data[i+2]=b; data[i+3]=255; } } ctx.putImageData(imageData,0,0); if(showPoints){ for(const p of points){ ctx.beginPath(); ctx.arc(p.x,p.y,radius,0,2*Math.PI); ctx.fillStyle = `rgb(${p.color.r},${p.color.g},${p.color.b})`; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#ffffff'; ctx.stroke(); } } } canvas.addEventListener('pointerdown', (ev)=>{ const rect = canvas.getBoundingClientRect(); const x = ev.clientX - rect.left; const y = ev.clientY - rect.top; const p = getPointAt(x,y); moved = false; startedOnPoint = !!p; if(p){ activePoint = p; offset.x = x - p.x; offset.y = y - p.y; if(menuTimeout) { clearTimeout(menuTimeout); menuTimeout = null; } menuTimeout = setTimeout(()=>{ if(!moved && typeof window.showPointMenu === 'function') window.showPointMenu(p.x,p.y,p); menuTimeout = null; }, 120); ev.stopPropagation(); } else { activePoint = null; } }); canvas.addEventListener('pointermove', (ev)=>{ if(!activePoint) return; if(menuTimeout){ clearTimeout(menuTimeout); menuTimeout = null; } const rect = canvas.getBoundingClientRect(); const x = ev.clientX - rect.left; const y = ev.clientY - rect.top; moved = true; activePoint.x = x - offset.x; activePoint.y = y - offset.y; if(typeof window.hidePointMenu === 'function') window.hidePointMenu(); renderGradient(); }); canvas.addEventListener('pointerup', (ev)=>{ if(menuTimeout){ clearTimeout(menuTimeout); menuTimeout = null; } const rect = canvas.getBoundingClientRect(); const x = ev.clientX - rect.left; const y = ev.clientY - rect.top; if(!moved && !startedOnPoint){ points.push({ x, y, color: hexToRgb(colorPicker.value) }); if(typeof window.hidePointMenu === 'function') window.hidePointMenu(); renderGradient(); } else if(!moved && startedOnPoint){ const p = getPointAt(x,y) || activePoint; if(p && typeof window.showPointMenu === 'function') window.showPointMenu(p.x,p.y,p); } activePoint = null; moved = false; startedOnPoint = false; }); document.addEventListener('pointerdown', (e)=>{ const menu = document.getElementById('point-menu'); if(menu && menu.style.display !== 'none' && !menu.contains(e.target)){ if(typeof window.hidePointMenu === 'function') window.hidePointMenu(); } }); function showSection(id) { document.querySelectorAll('.section').forEach(section => section.classList.remove('active')); const el = document.getElementById(id); if (el) el.classList.add('active'); } window.showSection = showSection; if (!canvas || !ctx) { console.error('Canvas or 2D context not available'); } window.canvas = canvas; window.points = points; window.renderGradient = renderGradient; window.hexToRgb = hexToRgb; renderGradient(); </script><script defer> const pointMenu = document.createElement('div'); pointMenu.id = 'point-menu'; pointMenu.style.position = 'absolute'; pointMenu.style.minWidth = '140px'; pointMenu.style.padding = '8px'; pointMenu.style.borderRadius = '10px'; pointMenu.style.boxShadow = '0 6px 20px rgba(0,0,0,0.4)'; pointMenu.style.display = 'none'; pointMenu.style.zIndex = '1000'; pointMenu.style.background = 'linear-gradient(180deg, rgba(0,245,255,0.08), rgba(255,0,200,0.08))'; pointMenu.style.color = '#fff'; pointMenu.style.backdropFilter = 'blur(6px)'; pointMenu.style.display = 'none'; pointMenu.style.flexDirection = 'column'; pointMenu.style.gap = '8px'; pointMenu.style.alignItems = 'stretch'; pointMenu.style.minWidth = '160px'; const pointer = document.createElement('div'); pointer.style.position = 'absolute'; pointer.style.width = '14px'; pointer.style.height = '14px'; pointer.style.background = pointMenu.style.background; pointer.style.transform = 'rotate(45deg)'; pointer.style.left = '12px'; pointer.style.top = '-7px'; pointer.style.boxShadow = '0 3px 8px rgba(0,0,0,0.3)'; pointMenu.appendChild(pointer); const changeColorBtn = document.createElement('button'); changeColorBtn.textContent = 'Farbe wechseln'; changeColorBtn.style.marginTop = '8px'; changeColorBtn.style.display = 'block'; changeColorBtn.style.width = '100%'; changeColorBtn.style.textAlign = 'left'; changeColorBtn.style.padding = '8px'; changeColorBtn.style.background = 'transparent'; changeColorBtn.style.border = '1px solid rgba(255,255,255,0.08)'; changeColorBtn.style.color = '#fff'; changeColorBtn.style.borderRadius = '6px'; pointMenu.appendChild(changeColorBtn); const duplicateBtn = document.createElement('button'); duplicateBtn.textContent = 'Duplizieren'; duplicateBtn.style.marginTop = '6px'; duplicateBtn.style.display = 'block'; duplicateBtn.style.width = '100%'; duplicateBtn.style.textAlign = 'left'; duplicateBtn.style.padding = '8px'; duplicateBtn.style.background = 'transparent'; duplicateBtn.style.border = '1px solid rgba(255,255,255,0.08)'; duplicateBtn.style.color = '#fff'; duplicateBtn.style.borderRadius = '6px'; pointMenu.appendChild(duplicateBtn); const deleteBtn = document.createElement('button'); deleteBtn.textContent = 'Löschen'; deleteBtn.style.marginTop = '6px'; deleteBtn.style.display = 'block'; deleteBtn.style.width = '100%'; deleteBtn.style.textAlign = 'left'; deleteBtn.style.padding = '8px'; deleteBtn.style.background = 'transparent'; deleteBtn.style.border = '1px solid rgba(255,255,255,0.08)'; deleteBtn.style.color = '#fff'; deleteBtn.style.borderRadius = '6px'; pointMenu.appendChild(deleteBtn); const hiddenColor = document.createElement('input'); hiddenColor.type = 'color'; hiddenColor.style.display = 'none'; pointMenu.appendChild(hiddenColor); let currentPointRef = null; changeColorBtn.addEventListener('click',()=>{ if(!currentPointRef) return; hiddenColor.value = rgbToHex(currentPointRef.color.r, currentPointRef.color.g, currentPointRef.color.b); hiddenColor.click(); }); hiddenColor.addEventListener('input', ()=>{ if(!currentPointRef) return; const toRgb = (typeof window.hexToRgb === 'function') ? window.hexToRgb : (h=>{ h=h.replace('#',''); return {r:parseInt(h.substring(0,2),16), g:parseInt(h.substring(2,4),16), b:parseInt(h.substring(4,6),16)} }); currentPointRef.color = toRgb(hiddenColor.value); if(typeof window.renderGradient === 'function') window.renderGradient(); }); duplicateBtn.addEventListener('click', ()=>{ if(!currentPointRef) return; const pts = window.points || []; const clone = { x: currentPointRef.x + 15, y: currentPointRef.y + 15, color: { r: currentPointRef.color.r, g: currentPointRef.color.g, b: currentPointRef.color.b } }; pts.push(clone); if(typeof window.renderGradient === 'function') window.renderGradient(); hidePointMenu(); }); deleteBtn.addEventListener('click', ()=>{ if(!currentPointRef) return; const pts = window.points || []; const idx = pts.indexOf(currentPointRef); if(idx !== -1) pts.splice(idx,1); if(typeof window.renderGradient === 'function') window.renderGradient(); hidePointMenu(); }); function rgbToHex(r,g,b){ return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''); } function showPointMenu(canvasX, canvasY, point){ currentPointRef = point; const canvasEl = window.canvas || document.getElementById('myCanvas'); if(!canvasEl) return; const rect = canvasEl.getBoundingClientRect(); const pageX = rect.left + canvasX; const pageY = rect.top + canvasY; pointMenu.style.left = (pageX - 20) + 'px'; pointMenu.style.top = (pageY - 60) + 'px'; pointMenu.style.display = 'flex'; } function hidePointMenu(){ pointMenu.style.display = 'none'; currentPointRef = null; } document.body.appendChild(pointMenu); window.showPointMenu = showPointMenu; window.hidePointMenu = hidePointMenu; </script><script defer> const exportBtn = document.getElementById('exportBtn'); const exportJsonBtn = document.getElementById('exportJsonBtn'); const jsonBtn = document.getElementById('jsonBtn'); const jsonMenu = document.getElementById('jsonMenu'); const importJsonBtn = document.getElementById('importJsonBtn'); const importFile = document.getElementById('importFile'); const pngBtn = document.getElementById('pngBtn'); const pngMenu = document.getElementById('pngMenu'); const exportPngMenuBtn = document.getElementById('exportPngMenuBtn'); function exportCanvasAsPNG(filename='canvas_gradient.png'){ if(typeof window.renderGradient === 'function') window.renderGradient(false); const c = window.canvas || document.getElementById('myCanvas'); if(!c) return; const link = document.createElement('a'); link.download = filename; link.href = c.toDataURL('image/png'); link.click(); if(typeof window.renderGradient === 'function') window.renderGradient(true); } function exportAsJSON(filename='canvas_gradient.json'){ const c = window.canvas || document.getElementById('myCanvas'); const rg = (typeof window.renderGradient === 'function'); const header = { type: 'gg2', meta: { date: new Date().toISOString(), programm: 'Gradient-Generator-v2-web' } }; const data = { size: [c.width, c.height], points: (window.points || []).map(p=>({ x: Math.round(p.x), y: Math.round(p.y), color: (p.color && (p.color.r!==undefined) ? ('#'+[p.color.r,p.color.g,p.color.b].map(v=>v.toString(16).padStart(2,'0')).join('')) : (p.color || '#000000')) })) }; const out = { header, data }; const blob = new Blob([JSON.stringify(out, null, 2)], {type: 'application/json'}); const link = document.createElement('a'); link.download = filename; link.href = URL.createObjectURL(blob); link.click(); setTimeout(()=>URL.revokeObjectURL(link.href), 1000); } if(jsonBtn && jsonMenu){ jsonBtn.addEventListener('click', (e)=>{ e.stopPropagation(); jsonMenu.classList.toggle('show'); }); document.addEventListener('click', ()=>{ if(jsonMenu) jsonMenu.classList.remove('show'); }); } if(exportJsonBtn) exportJsonBtn.addEventListener('click', ()=>{ exportAsJSON(); jsonMenu.classList.remove('show'); }); if(importJsonBtn && importFile){ importJsonBtn.addEventListener('click', ()=>{ importFile.click(); }); importFile.addEventListener('change', async (e)=>{ const f = e.target.files && e.target.files[0]; if(!f) return; const text = await f.text(); try{ const obj = JSON.parse(text); if(!obj.header || obj.header.type !== 'gg2'){ alert('Ungültiger Dateityp. Erwartet type=gg2'); return; } if(!obj.data || !Array.isArray(obj.data.points)){ alert('Ungültiges Datenformat'); return; } const pts = obj.data.points.map(p=>({ x: p.x, y: p.y, color: (typeof p.color === 'string' ? (p.color.startsWith('#')?p.color:p.color) : p.color) })); for(const p of pts){ if(typeof p.color === 'string'){ const h = p.color.replace('#',''); p.color = { r: parseInt(h.substring(0,2),16), g: parseInt(h.substring(2,4),16), b: parseInt(h.substring(4,6),16) }; } } window.points.length = 0; pts.forEach(p=>window.points.push(p)); if(typeof window.renderGradient === 'function') window.renderGradient(); jsonMenu.classList.remove('show'); alert('Import erfolgreich. ' + pts.length + ' Punkte geladen.'); }catch(err){ alert('Fehler beim Import: ' + err.message); } }); } if(exportBtn) exportBtn.addEventListener('click', ()=>exportCanvasAsPNG()); if(pngBtn && pngMenu){ pngBtn.addEventListener('click', (e)=>{ e.stopPropagation(); pngMenu.classList.toggle('show'); }); document.addEventListener('click', ()=>{ if(pngMenu) pngMenu.classList.remove('show'); }); } if(exportPngMenuBtn){ exportPngMenuBtn.addEventListener('click', ()=>{ exportCanvasAsPNG(); pngMenu.classList.remove('show'); }); } </script></body></html>
