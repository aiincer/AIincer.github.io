<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIincer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<header>
  <h1>AIincer</h1>
</header>

<nav>
  <button onclick="showSection('partner')">Partner</button>
  <button onclick="showSection('ludwig')">Ludwig</button>
</nav>
  
<!-- partner Section -->
<div id="partner" class="section">
  <div class="card" onclick="window.location.href='/host/0/dsdmt'">
    <h2>DSDMT</h2>
    <p></p>
  </div>
  <div class="card" onclick="window.location.href='/host/0/citrus'">
    <h2>(Citrus Client)</h2>
    <p></p>
  </div>
</div>
  
<!-- ludwig Section -->
<div id="ludwig" class="section active">
  <div class="card" onclick="window.location.href='/game/0/1'">
    <h2>Lookmaxer-java</h2>
    <p>Finde deinen Looksmax-Score heraus</p>
  </div>
</div>

<footer id="lizenz"></footer>

</div>
<script src="/assets/js/lizenz.js"></script>
<script>
function showSection(id) {
  document.querySelectorAll('.section').forEach(section => {
    section.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
