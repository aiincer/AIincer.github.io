        cursor: pointer;
        transition: background-color 0.3s;
        text-decoration: none;
        display: inline-block;
    }

    .hero .cta-button:hover {
        background-color: #388e3c;
    }

    footer {
        text-align: center;
        padding: 20px;
        color: #388e3c;
        border-top: 1px solid #a5d6a7;
        margin-top: 50px;
    }

    @media(max-width: 768px){
        header {
            flex-direction: column;
            gap: 10px;
        }
        nav ul {
            gap: 15px;
        }
        .hero h1 {
            font-size: 2.2rem;
        }
        .hero p {
