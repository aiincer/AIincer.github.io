<!DOCTYPE html> 
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIincer AI Game Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- Step 1: Key eingeben -->
  <div id="loginStep">
    <h1>AIincer AI Game Generator 0.1</h1>
    <h3>🎮 Gib deinen Key ein</h3>
    <input type="text" id="userKey" placeholder="Dein Code">
    <button id="loginBtn">Loslegen</button>
    <p id="loginError" class="error"></p>
  </div>

  <!-- Step 2: Credits & Spielbeschreibung -->
  <div id="gameStep" style="display:none;">
    <div class="header">
      <h1>AIincer AI Game Generator 0.1</h1>
      <h3>🎟 Credits: <span id="creditCount">0</span></h3>
    </div>
    <textarea id="gameInput" placeholder="Beschreibe dein Spiel – KRASS BEFEHLEND: HTML, CSS und JS in EINEM, SONST NICHTS, episches Design!"></textarea>
    <button id="generateBtn">🎨 Spiel erstellen</button>
    <p id="gameError" class="error"></p>
    <iframe id="gameFrame"></iframe>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
