<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Epic Green Asteroids</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #001a00; /* dunkles Grün */
  }
  canvas {
    display: block;
    background-color: #001a00;
  }
  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #00ff00;
    font-family: 'Courier New', monospace;
    font-size: 24px;
  }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;

class Ship {
    constructor() {
        this.x = canvas.width/2;
        this.y = canvas.height/2;
        this.angle = 0;
        this.velocity = {x:0, y:0};
        this.radius = 20;
    }
    update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        // Bildschirmwrap
        if(this.x<0) this.x = canvas.width;
        if(this.x>canvas.width) this.x = 0;
        if(this.y<0) this.y = canvas.height;
        if(this.y>canvas.height) this.y = 0;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(20,0);
        ctx.lineTo(-15,10);
        ctx.lineTo(-10,0);
        ctx.lineTo(-15,-10);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }
}

class Asteroid {
    constructor(x,y,radius,speed){
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.speed = speed;
        this.angle = Math.random()*Math.PI*2;
        this.vertices = Math.floor(Math.random()*5)+5;
        this.offsets = Array.from({length:this.vertices}, ()=>Math.random()*this.radius*0.4 - this.radius*0.2);
    }
    update() {
        this.x += Math.cos(this.angle)*this.speed;
        this.y += Math.sin(this.angle)*this.speed;
        if(this.x<0) this.x = canvas.width;
        if(this.x>canvas.width) this.x = 0;
        if(this.y<0) this.y = canvas.height;
        if(this.y>canvas.height) this.y = 0;
    }
    draw() {
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for(let i=0;i<this.vertices;i++){
            let angle = (i/this.vertices)*Math.PI*2;
            let r = this.radius + this.offsets[i];
            let px = this.x + Math.cos(angle)*r;
            let py = this.y + Math.sin(angle)*r;
            if(i===0) ctx.moveTo(px,py);
            else ctx.lineTo(px,py);
        }
        ctx.closePath();
        ctx.stroke();
    }
}

class Bullet {
    constructor(x,y,angle){
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = 10;
        this.radius = 2;
    }
    update(){
        this.x += Math.cos(this.angle)*this.speed;
        this.y += Math.sin(this.angle)*this.speed;
    }
    draw(){
        ctx.fillStyle = '#00ff00';
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fill();
    }
}

let ship = new Ship();
let asteroids = [];
let bullets = [];

for(let i=0;i<5;i++){
    asteroids.push(new Asteroid(Math.random()*canvas.width, Math.random()*canvas.height, 50, Math.random()*2+1));
}

let keys = {};
document.addEventListener('keydown', e=>keys[e.code]=true);
document.addEventListener('keyup', e=>keys[e.code]=false);

function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Ship movement
    if(keys['ArrowLeft']) ship.angle -= 0.05;
    if(keys['ArrowRight']) ship.angle += 0.05;
    if(keys['ArrowUp']){
        ship.velocity.x += Math.cos(ship.angle)*0.1;
        ship.velocity.y += Math.sin(ship.angle)*0.1;
    }

    ship.update();
    ship.draw();

    // Bullets
    bullets.forEach((b,i)=>{
        b.update();
        b.draw();
        if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height) bullets.splice(i,1);
    });

    // Asteroids
    asteroids.forEach((a, ai)=>{
        a.update();
        a.draw();

        // Collision with bullets
        bullets.forEach((b, bi)=>{
            let dx = a.x - b.x;
            let dy = a.y - b.y;
            if(Math.sqrt(dx*dx + dy*dy) < a.radius){
                bullets.splice(bi,1);
                if(a.radius>20){
                    asteroids.push(new Asteroid(a.x,a.y,a.radius/2,a.speed+0.5));
                    asteroids.push(new Asteroid(a.x,a.y,a.radius/2,a.speed+0.5));
                }
                asteroids.splice(ai,1);
                score += 10;
                document.getElementById('score').innerText = 'Score: '+score;
            }
        });
    });

    requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e=>{
    if(e.code==='Space'){
        bullets.push(new Bullet(ship.x + Math.cos(ship.angle)*20, ship.y + Math.sin(ship.angle)*20, ship.angle));
    }
});

gameLoop();
</script>
</body>
</html>
